services:
  db:
    image: postgres:16
    container_name: aerosync-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aerosync_ops_dev
    ports:
      - "5432:5432"
    volumes:
      - aerosync_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aerosync-backend
    environment:
      MIX_ENV: dev
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: aerosync_ops_dev
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aerosync-frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_WS_URL: ws://localhost:4000/socket
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  aerosync_pg_data:
